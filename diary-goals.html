<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Дневник целей — Екатерина Судас</title>
<meta name="description" content="Дневник целеполагания на год. Еженедельный трекинг прогресса к целям.">
<meta name="theme-color" content="#fff2e6">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--cream:#fff2e6;--cream-d:#f5e6d3;--cr:#6B1D3A;--cr-l:#8A2E50;--cab:#4A0E28;--mul:#2D0A1E;--td:#0f0806;--tb:#1a0f0a;--tm:#4a3830;--tl:#5a4a40;--bd:rgba(107,29,58,.12)}
html{font-size:18px;scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--cream);color:var(--tb);line-height:1.7;min-height:100vh;padding-bottom:80px}
.header{background:rgba(255,242,230,.95);backdrop-filter:blur(20px);padding:16px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(40,13,8,.06);display:flex;align-items:center;justify-content:space-between}
.header-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:500;color:var(--td)}
.header-title span{color:var(--cr)}
.header-sub{font-family:'Raleway',sans-serif;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--tm)}
.header-back{font-size:.7rem;color:var(--cr);text-decoration:none;font-family:'Raleway',sans-serif;letter-spacing:.1em}
.header-links{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.header-links a{font-size:.68rem;color:var(--cr);text-decoration:none;font-family:'Raleway',sans-serif;letter-spacing:.08em;padding:4px 10px;border:1px solid var(--bd);border-radius:14px;transition:all .3s;white-space:nowrap}
.header-links a:hover{border-color:var(--cr);background:rgba(107,29,58,.06)}
.container{max-width:640px;margin:0 auto;padding:20px 16px}
.tabs{display:flex;gap:6px;margin-bottom:24px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{font-family:'Raleway',sans-serif;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;padding:9px 15px;border-radius:20px;border:1.5px solid var(--bd);background:transparent;color:var(--tm);cursor:pointer;white-space:nowrap;transition:all .3s}
.tab.active{background:var(--cr);color:var(--cream);border-color:var(--cr)}
.sec-title{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:500;color:var(--td);margin-bottom:6px}
.sec-sub{font-size:.82rem;color:var(--tm);margin-bottom:20px;line-height:1.6}
.divider{width:50px;height:2px;background:linear-gradient(to right,transparent,var(--cr),transparent);margin:0 0 16px;border-radius:2px}
.form-group{margin-bottom:16px}
.form-label{font-family:'Raleway',sans-serif;font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--tm);margin-bottom:6px;display:block}
.form-input,.form-textarea{width:100%;font-family:'Inter',sans-serif;font-size:.88rem;color:var(--tb);background:rgba(255,255,255,.6);border:1.5px solid var(--bd);border-radius:12px;padding:12px 14px;outline:none;transition:border-color .3s}
.form-input:focus,.form-textarea:focus{border-color:var(--cr)}
.form-textarea{min-height:80px;resize:vertical;line-height:1.6}
.form-select{width:100%;font-family:'Inter',sans-serif;font-size:.88rem;color:var(--tb);background:rgba(255,255,255,.6);border:1.5px solid var(--bd);border-radius:12px;padding:12px 14px;outline:none;-webkit-appearance:none;appearance:none;cursor:pointer}
.btn{font-family:'Playfair Display',serif;font-size:.85rem;padding:13px 26px;border-radius:24px;border:none;cursor:pointer;transition:all .4s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--cr);color:var(--cream)}.btn-primary:hover{background:var(--cr-l);box-shadow:0 4px 16px rgba(107,29,58,.2)}
.btn-secondary{background:transparent;color:var(--cr);border:1.5px solid var(--bd)}.btn-secondary:hover{border-color:var(--cr)}
.btn-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.btn-sm{padding:10px 16px;font-size:.78rem}
.btn-danger{background:transparent;color:#a33;border:1.5px solid rgba(170,50,50,.2)}.btn-danger:hover{background:rgba(170,50,50,.06)}
.card{background:rgba(255,255,255,.5);border:1.5px solid var(--bd);border-radius:16px;padding:16px;margin-bottom:12px}
.card-date{font-family:'Raleway',sans-serif;font-size:.63rem;letter-spacing:.18em;text-transform:uppercase;color:var(--tm);margin-bottom:6px}
.card-text{font-size:.88rem;color:var(--td);margin-bottom:6px;line-height:1.6}
.card-tag{display:inline-block;font-size:.7rem;padding:3px 10px;border-radius:12px;background:rgba(107,29,58,.08);color:var(--cr);margin:2px 2px 2px 0}
.card-dim{font-size:.8rem;color:var(--tm);line-height:1.6}

/* Goal card */
.goal-card{background:rgba(255,255,255,.5);border:1.5px solid var(--bd);border-radius:16px;padding:16px;margin-bottom:14px}
.goal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.goal-name{font-family:'Playfair Display',serif;font-size:1rem;color:var(--td);flex:1}
.goal-cat{font-size:.65rem;padding:3px 9px;border-radius:10px;background:rgba(107,29,58,.08);color:var(--cr);white-space:nowrap;margin-left:8px}
.goal-desc{font-size:.82rem;color:var(--tm);margin-bottom:10px;line-height:1.5}
.progress-bar{width:100%;height:8px;background:var(--cream-d);border-radius:4px;overflow:hidden;margin-bottom:4px}
.progress-fill{height:100%;background:linear-gradient(to right,var(--cr),var(--cr-l));border-radius:4px;transition:width .5s ease}
.progress-info{display:flex;justify-content:space-between;font-size:.7rem;color:var(--tm)}
.goal-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}

/* Weekly check-in */
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.week-label{font-family:'Playfair Display',serif;font-size:1rem;color:var(--td)}
.week-btn{background:none;border:1.5px solid var(--bd);border-radius:50%;width:32px;height:32px;cursor:pointer;color:var(--tm);font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:all .3s}
.week-btn:hover{border-color:var(--cr);color:var(--cr)}

.checkin-goal{background:rgba(255,255,255,.5);border:1.5px solid var(--bd);border-radius:14px;padding:14px;margin-bottom:10px}
.checkin-name{font-family:'Playfair Display',serif;font-size:.92rem;color:var(--td);margin-bottom:6px}
.checkin-slider{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.checkin-slider input[type=range]{flex:1;-webkit-appearance:none;height:4px;background:linear-gradient(to right,var(--cr),var(--cream-d));border-radius:4px;outline:none}
.checkin-slider input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--cr);cursor:pointer;box-shadow:0 2px 8px rgba(107,29,58,.3)}
.checkin-val{font-family:'Playfair Display',serif;font-size:1rem;color:var(--cr);min-width:32px;text-align:center}
.checkin-note{width:100%;font-family:'Inter',sans-serif;font-size:.82rem;color:var(--tb);background:rgba(255,255,255,.4);border:1px solid var(--bd);border-radius:10px;padding:8px 10px;outline:none;resize:none;height:50px}

/* Stats */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.stat-card{background:rgba(255,255,255,.5);border:1.5px solid var(--bd);border-radius:14px;padding:14px;text-align:center}
.stat-num{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--cr);line-height:1}
.stat-label{font-size:.68rem;color:var(--tm);margin-top:4px}

.chart-wrap{background:rgba(255,255,255,.5);border:1.5px solid var(--bd);border-radius:14px;padding:14px;margin-bottom:14px}
.chart-title{font-family:'Raleway',sans-serif;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--tm);margin-bottom:10px}

.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-name{flex:1;font-size:.78rem;color:var(--tm);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{width:100px;height:6px;background:var(--cream-d);border-radius:3px;overflow:hidden;flex-shrink:0}
.bar-fill{height:100%;background:var(--cr);border-radius:3px;transition:width .5s}
.bar-count{font-size:.68rem;color:var(--cr);min-width:32px;text-align:right}

.empty{text-align:center;padding:40px 20px;color:var(--tm)}
.empty-text{font-size:.85rem;line-height:1.6}
.panel{display:none}.panel.active{display:block}
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,8,6,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--cream);border-radius:20px;padding:24px;max-width:400px;width:100%}
.modal-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--td);margin-bottom:10px}

/* Week history dots */
.week-dots{display:flex;gap:3px;flex-wrap:wrap;margin-top:6px}
.week-dot{width:14px;height:14px;border-radius:3px;font-size:.5rem;display:flex;align-items:center;justify-content:center;color:#fff}

@media(max-width:480px){html{font-size:16px}.container{padding:14px 12px}}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Дневник <span>целей</span></div>
    <div class="header-sub">целеполагание на год</div>
  </div>
  <div class="header-links">
    <a href="https://sudas-psy.ru" target="_blank">Сайт</a>
    <a href="https://t.me/sudas_psy" target="_blank">Telegram</a>
    <a href="https://t.me/psyMuza" target="_blank">Канал</a>
    <a href="https://dzen.ru/id/69a1e2a84aaf5559c210326b" target="_blank">Дзен</a>
  </div>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab active" data-tab="goals">Цели</button>
    <button class="tab" data-tab="checkin">Неделя</button>
    <button class="tab" data-tab="progress">Прогресс</button>
    <button class="tab" data-tab="add">+ Цель</button>
  </div>

  <!-- GOALS LIST -->
  <div class="panel active" id="panel-goals">
    <div class="sec-title">Мои цели на год</div>
    <div class="divider"></div>
    <div id="goals-list"></div>
  </div>

  <!-- WEEKLY CHECK-IN -->
  <div class="panel" id="panel-checkin">
    <div class="sec-title">Еженедельный чек-ин</div>
    <div class="divider"></div>
    <div class="week-nav">
      <button class="week-btn" id="w-prev">&larr;</button>
      <div class="week-label" id="w-label"></div>
      <button class="week-btn" id="w-next">&rarr;</button>
    </div>
    <div class="sec-sub">Оцените прогресс по каждой цели за эту неделю (0-100%)</div>
    <div id="checkin-list"></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-save-checkin">Сохранить чек-ин</button>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="panel" id="panel-progress">
    <div class="sec-title">Общий прогресс</div>
    <div class="divider"></div>
    <div class="stat-grid" id="p-stats"></div>
    <div id="p-goals"></div>
    <div class="btn-row">
      <button class="btn btn-secondary btn-sm" id="btn-export">Экспорт</button>
      <button class="btn btn-danger btn-sm" id="btn-nuke">Удалить всё</button>
    </div>
  </div>

  <!-- ADD GOAL -->
  <div class="panel" id="panel-add">
    <div class="sec-title">Новая цель</div>
    <div class="divider"></div>
    <div class="sec-sub">Определите цель на год. Чем конкретнее — тем проще отслеживать.</div>

    <div class="form-group">
      <label class="form-label">Название цели</label>
      <input class="form-input" id="g-name" placeholder="Например: Выучить английский до B2">
    </div>
    <div class="form-group">
      <label class="form-label">Описание / зачем</label>
      <textarea class="form-textarea" id="g-desc" placeholder="Зачем вам эта цель? Что изменится?" rows="2"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Категория</label>
      <select class="form-select" id="g-cat">
        <option value="Здоровье">Здоровье</option>
        <option value="Карьера">Карьера</option>
        <option value="Отношения">Отношения</option>
        <option value="Финансы">Финансы</option>
        <option value="Развитие">Развитие</option>
        <option value="Творчество">Творчество</option>
        <option value="Привычки">Привычки</option>
        <option value="Другое">Другое</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Ключевые шаги (каждый с новой строки)</label>
      <textarea class="form-textarea" id="g-steps" placeholder="1. Записаться на курс&#10;2. Заниматься 30 мин/день&#10;3. Сдать экзамен" rows="4"></textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-add-goal">Добавить цель</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title">Данные скопированы</div>
    <div class="sec-sub">JSON в буфере обмена.</div>
    <button class="btn btn-primary btn-sm" onclick="document.getElementById('modal').classList.remove('show')">Ок</button>
  </div>
</div>

<script>
(function(){
  var GKEY='goals_diary_2026';
  var CKEY='goals_checkins_2026';

  function loadG(){try{return JSON.parse(localStorage.getItem(GKEY))||[]}catch(e){return[]}}
  function saveG(d){localStorage.setItem(GKEY,JSON.stringify(d))}
  function loadC(){try{return JSON.parse(localStorage.getItem(CKEY))||{}}catch(e){return{}}}
  function saveC(d){localStorage.setItem(CKEY,JSON.stringify(d))}
  function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
  function $(id){return document.getElementById(id)}

  // Week helpers
  function getWeekKey(date){
    var d=new Date(date);
    var jan1=new Date(d.getFullYear(),0,1);
    var days=Math.floor((d-jan1)/86400000);
    var wn=Math.ceil((days+jan1.getDay()+1)/7);
    return d.getFullYear()+'-W'+String(wn).padStart(2,'0');
  }
  function weekLabel(wk){
    var parts=wk.split('-W');
    return 'Неделя '+parseInt(parts[1])+', '+parts[0];
  }
  function getCurrentWeek(){return getWeekKey(new Date())}
  function offsetWeek(wk,offset){
    var parts=wk.split('-W');
    var y=parseInt(parts[0]),w=parseInt(parts[1]);
    w+=offset;
    if(w<1){y--;w=52}
    if(w>52){y++;w=1}
    return y+'-W'+String(w).padStart(2,'0');
  }

  // Tabs
  document.querySelectorAll('.tab').forEach(function(t){
    t.onclick=function(){
      document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active')});
      t.classList.add('active');
      document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
      $('panel-'+t.dataset.tab).classList.add('active');
      if(t.dataset.tab==='goals')renderGoals();
      if(t.dataset.tab==='checkin')renderCheckin();
      if(t.dataset.tab==='progress')renderProgress();
    };
  });

  // Add goal
  $('btn-add-goal').onclick=function(){
    var name=$('g-name').value.trim();
    if(!name){alert('Введите название цели');return}
    var goal={
      id:Date.now(),
      name:name,
      desc:$('g-desc').value.trim(),
      cat:$('g-cat').value,
      steps:$('g-steps').value.trim().split('\n').filter(function(s){return s.trim()}),
      created:new Date().toISOString()
    };
    var g=loadG();g.push(goal);saveG(g);
    $('g-name').value='';$('g-desc').value='';$('g-steps').value='';
    alert('Цель добавлена!');
    // switch to goals tab
    document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active')});
    document.querySelector('[data-tab="goals"]').classList.add('active');
    document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
    $('panel-goals').classList.add('active');
    renderGoals();
  };

  // Render goals
  function renderGoals(){
    var goals=loadG(),el=$('goals-list');
    if(!goals.length){el.innerHTML='<div class="empty"><div class="empty-text">Нет целей. Добавьте первую во вкладке "+ Цель".</div></div>';return}
    var checkins=loadC();
    var h='';
    goals.forEach(function(g){
      var pct=calcGoalProgress(g.id,checkins);
      h+='<div class="goal-card">';
      h+='<div class="goal-head"><div class="goal-name">'+esc(g.name)+'</div><div class="goal-cat">'+esc(g.cat)+'</div></div>';
      if(g.desc)h+='<div class="goal-desc">'+esc(g.desc)+'</div>';
      h+='<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>';
      h+='<div class="progress-info"><span>'+pct+'%</span><span>цель на год</span></div>';
      if(g.steps&&g.steps.length){
        h+='<div style="margin-top:8px">';
        g.steps.forEach(function(s){h+='<div style="font-size:.78rem;color:var(--tm);padding:2px 0">'+esc(s)+'</div>'});
        h+='</div>';
      }
      // Week history visualization
      h+='<div class="chart-title" style="margin-top:10px">История недель</div>';
      h+='<div class="week-dots">'+getWeekDots(g.id,checkins)+'</div>';
      h+='<div class="goal-actions">';
      h+='<button class="btn btn-danger btn-sm" onclick="delGoal('+g.id+')">Удалить</button>';
      h+='</div></div>';
    });
    el.innerHTML=h;
  }

  function calcGoalProgress(goalId,checkins){
    var vals=[];
    Object.keys(checkins).forEach(function(wk){
      var wc=checkins[wk];
      if(wc[goalId]!==undefined)vals.push(wc[goalId].pct||0);
    });
    if(!vals.length)return 0;
    // Latest check-in value as current progress
    return vals[vals.length-1];
  }

  function getWeekDots(goalId,checkins){
    var weeks=Object.keys(checkins).sort();
    var h='';
    weeks.forEach(function(wk){
      var wc=checkins[wk];
      if(wc[goalId]!==undefined){
        var p=wc[goalId].pct||0;
        var color;
        if(p>=75)color='var(--cr)';
        else if(p>=50)color='var(--cr-l)';
        else if(p>=25)color='var(--tm)';
        else color='var(--cream-d)';
        h+='<div class="week-dot" style="background:'+color+'" title="'+weekLabel(wk)+': '+p+'%"></div>';
      }
    });
    return h||'<span style="font-size:.75rem;color:var(--tl)">Нет чек-инов</span>';
  }

  window.delGoal=function(id){
    if(!confirm('Удалить цель?'))return;
    saveG(loadG().filter(function(g){return g.id!==id}));renderGoals();
  };

  // Weekly check-in
  var curWeek=getCurrentWeek();

  $('w-prev').onclick=function(){curWeek=offsetWeek(curWeek,-1);renderCheckin()};
  $('w-next').onclick=function(){curWeek=offsetWeek(curWeek,1);renderCheckin()};

  function renderCheckin(){
    $('w-label').textContent=weekLabel(curWeek);
    var goals=loadG(),checkins=loadC(),el=$('checkin-list');
    var wc=checkins[curWeek]||{};

    if(!goals.length){el.innerHTML='<div class="empty"><div class="empty-text">Сначала добавьте цели.</div></div>';return}

    var h='';
    goals.forEach(function(g){
      var val=wc[g.id]?wc[g.id].pct:0;
      var note=wc[g.id]?wc[g.id].note:'';
      h+='<div class="checkin-goal">';
      h+='<div class="checkin-name">'+esc(g.name)+' <span style="font-size:.7rem;color:var(--tm)">'+esc(g.cat)+'</span></div>';
      h+='<div class="checkin-slider"><input type="range" min="0" max="100" step="5" value="'+val+'" data-gid="'+g.id+'" class="ci-slider"><span class="checkin-val">'+val+'%</span></div>';
      h+='<textarea class="checkin-note" data-gid="'+g.id+'" placeholder="Заметка за неделю...">'+esc(note)+'</textarea>';
      h+='</div>';
    });
    el.innerHTML=h;

    // Slider events
    el.querySelectorAll('.ci-slider').forEach(function(s){
      s.oninput=function(){s.nextElementSibling.textContent=s.value+'%'};
    });
  }

  $('btn-save-checkin').onclick=function(){
    var checkins=loadC();
    var wc={};
    var sliders=document.querySelectorAll('.ci-slider');
    var notes=document.querySelectorAll('.checkin-note');
    sliders.forEach(function(s,i){
      wc[s.dataset.gid]={pct:parseInt(s.value),note:notes[i].value.trim()};
    });
    checkins[curWeek]=wc;
    saveC(checkins);
    alert('Чек-ин сохранён!');
  };

  // Progress overview
  function renderProgress(){
    var goals=loadG(),checkins=loadC();
    var n=goals.length;
    var totalWeeks=Object.keys(checkins).length;
    var avgPct=0;
    if(n){
      var sum=0;
      goals.forEach(function(g){sum+=calcGoalProgress(g.id,checkins)});
      avgPct=Math.round(sum/n);
    }
    var onTrack=0;
    goals.forEach(function(g){if(calcGoalProgress(g.id,checkins)>=50)onTrack++});

    $('p-stats').innerHTML=
      '<div class="stat-card"><div class="stat-num">'+n+'</div><div class="stat-label">Целей</div></div>'+
      '<div class="stat-card"><div class="stat-num">'+totalWeeks+'</div><div class="stat-label">Чек-инов</div></div>'+
      '<div class="stat-card"><div class="stat-num">'+avgPct+'%</div><div class="stat-label">Средний прогресс</div></div>'+
      '<div class="stat-card"><div class="stat-num">'+onTrack+'</div><div class="stat-label">На пути (50%+)</div></div>';

    // Per-goal progress with weekly trend
    var ph='';
    goals.forEach(function(g){
      var pct=calcGoalProgress(g.id,checkins);
      ph+='<div class="chart-wrap">';
      ph+='<div class="chart-title">'+esc(g.name)+'</div>';
      ph+='<div class="progress-bar" style="margin-bottom:8px"><div class="progress-fill" style="width:'+pct+'%"></div></div>';
      ph+='<div class="progress-info" style="margin-bottom:8px"><span>'+pct+'%</span><span>'+esc(g.cat)+'</span></div>';

      // Weekly trend
      var weeks=Object.keys(checkins).sort();
      var wvals=[];
      weeks.forEach(function(wk){
        if(checkins[wk][g.id]!==undefined)wvals.push({wk:wk,pct:checkins[wk][g.id].pct,note:checkins[wk][g.id].note});
      });
      if(wvals.length){
        wvals.forEach(function(wv){
          ph+='<div class="bar-row"><div class="bar-name">'+weekLabel(wv.wk)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+wv.pct+'%"></div></div><div class="bar-count">'+wv.pct+'%</div></div>';
          if(wv.note)ph+='<div style="font-size:.72rem;color:var(--tm);margin:-4px 0 6px 0;font-style:italic">'+esc(wv.note)+'</div>';
        });
      }else{
        ph+='<div style="font-size:.78rem;color:var(--tl)">Нет чек-инов</div>';
      }
      ph+='</div>';
    });
    $('p-goals').innerHTML=ph;
  }

  // Export
  $('btn-export').onclick=function(){
    var data=JSON.stringify({goals:loadG(),checkins:loadC()},null,2);
    if(navigator.clipboard){navigator.clipboard.writeText(data).then(function(){$('modal').classList.add('show')})}
    else{prompt('Скопируйте:',data)}
  };
  $('btn-nuke').onclick=function(){
    if(!confirm('Удалить ВСЕ цели и чек-ины? Необратимо!'))return;
    if(!confirm('Точно?'))return;
    saveG([]);saveC({});renderGoals();
  };

  // Init
  renderGoals();
})();
</script>
</body>
</html>

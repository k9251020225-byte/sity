<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>Инструкция к себе — Екатерина Судас</title>
<meta name="theme-color" content="#F5F0EB">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Raleway:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F5F0EB;--accent:#8B0020;--accent-l:#a8334a;--td:#1a0f0a;--tm:#5a4a40;--tl:#8a7a70;--bd:rgba(139,0,32,.1);--card:rgba(255,255,255,.6)}
html{font-size:18px;scroll-behavior:smooth}
body{font-family:'Raleway',system-ui,sans-serif;background:var(--bg);color:var(--td);line-height:1.8;min-height:100vh}
.wrap{max-width:640px;margin:0 auto;padding:20px 16px 80px}
h1{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:500;color:var(--td);margin-bottom:4px;line-height:1.3}
h2{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:500;color:var(--td);margin-bottom:6px}
.subtitle{font-size:.82rem;color:var(--tm);margin-bottom:24px;line-height:1.6}
.divider{width:50px;height:2px;background:linear-gradient(to right,transparent,var(--accent),transparent);margin:0 0 20px;border-radius:2px}
/* Progress bar */
.progress{display:flex;align-items:center;gap:8px;margin-bottom:28px;padding:0 4px}
.progress-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:.6rem;color:var(--tl);transition:all .3s;font-family:'Raleway',sans-serif}
.progress-dot.active{border-color:var(--accent);color:var(--accent);font-weight:600}
.progress-dot.done{background:var(--accent);border-color:var(--accent);color:#fff}
.progress-line{flex:1;height:2px;background:var(--bd)}
.progress-line.done{background:var(--accent)}
/* Step */
.step{display:none}.step.active{display:block}
/* Card */
.card{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:20px;margin-bottom:16px}
.card-text{font-size:.88rem;color:var(--td);line-height:1.85}
.card-text p{margin-bottom:12px}
.card-text strong{color:var(--accent)}
.card-dim{font-size:.78rem;color:var(--tl);font-style:italic;line-height:1.6;margin-top:8px}
/* Form */
.field{margin-bottom:14px}
.field-label{font-family:'Raleway',sans-serif;font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--tm);margin-bottom:5px;display:block}
.field-input,.field-textarea{width:100%;font-family:'Inter',sans-serif;font-size:.88rem;color:var(--td);background:rgba(255,255,255,.7);border:1.5px solid var(--bd);border-radius:12px;padding:14px;outline:none;transition:border-color .3s;min-height:48px}
.field-input:focus,.field-textarea:focus{border-color:var(--accent)}
.field-textarea{min-height:70px;resize:vertical;line-height:1.6}
/* Hour block */
.hour-block{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:10px}
.hour-time{font-family:'Playfair Display',serif;font-size:.9rem;color:var(--accent);margin-bottom:8px}
.hour-field{margin-bottom:8px}
.hour-field label{font-size:.68rem;color:var(--tm);display:block;margin-bottom:3px}
.hour-field input,.hour-field textarea{width:100%;font-family:'Inter',sans-serif;font-size:.82rem;border:1px solid var(--bd);border-radius:8px;padding:10px;background:rgba(255,255,255,.5);outline:none;min-height:44px}
.hour-field textarea{min-height:44px;resize:none}
/* Value card */
.value-card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:12px}
.value-card .field-label{color:var(--accent)}
/* Buttons */
.btn{font-family:'Playfair Display',serif;font-size:.88rem;padding:14px 28px;border-radius:24px;border:none;cursor:pointer;transition:all .4s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-l)}
.btn-secondary{background:transparent;color:var(--accent);border:1.5px solid var(--bd)}
.btn-row{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap;justify-content:space-between}
.btn-sm{padding:10px 18px;font-size:.8rem}
/* Resistance blocks */
.resist{background:rgba(139,0,32,.03);border-left:3px solid var(--accent);border-radius:0 12px 12px 0;padding:14px 16px;margin-bottom:12px}
.resist-quote{font-family:'Playfair Display',serif;font-size:.9rem;color:var(--accent);font-style:italic;margin-bottom:6px}
.resist-text{font-size:.82rem;color:var(--tm);line-height:1.7}
/* CTA */
.cta-block{background:var(--card);border:1.5px solid var(--bd);border-radius:20px;padding:24px;margin-top:24px;text-align:center}
.cta-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--td);margin-bottom:8px}
.cta-text{font-size:.82rem;color:var(--tm);line-height:1.7;margin-bottom:16px}
.cta-paths{text-align:left}
.cta-path{padding:12px 0;border-bottom:1px solid var(--bd)}
.cta-path:last-child{border:none}
.cta-path-name{font-family:'Playfair Display',serif;font-size:.9rem;color:var(--accent)}
.cta-path-desc{font-size:.8rem;color:var(--tm);line-height:1.6;margin-top:4px}
/* Author */
.author{text-align:center;margin-top:30px;padding-top:20px;border-top:1px solid var(--bd)}
.author-name{font-family:'Playfair Display',serif;font-size:1rem;color:var(--td)}
.author-role{font-size:.72rem;color:var(--tm);margin-top:2px}
.author-links{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.author-links a{font-size:.7rem;color:var(--accent);text-decoration:none;padding:5px 12px;border:1px solid var(--bd);border-radius:14px}
@media(max-width:480px){html{font-size:16px}.wrap{padding:16px 12px 80px}}
</style>
</head>
